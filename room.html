<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>the thoughts room</title>
    <meta charset="utf-8"/>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
    <meta name="viewport" content="width=device-width, user-scalable=no"/>
    <meta name="description" content="Free yourself from negative thoughts"/>
  </head>
  
  <body>
    
    <h1>the thoughts room</h1>
    
    <audio name="audio" controls loop preload="auto">
      <source src="media/art-of-silence.ogg" type="audio/ogg">
      <source src="media/art-of-silence.mp3" type="audio/mpeg">
    </audio>
    <div class="container">
      
      <label for="input"></label>
      say something.
      <div id="wrapper">
        <input id="input" autofocus/>
        <div id="tailHolder">
        </div>
      </div>

      <div class="instructions"> 
        <i>to finish your thought, press the [period] key.</i> <br>
      </div>
      
    </div>
  </body>
  <script src="scripts.js"></script>
  <footer>
    <p> a reprisal of amitay tweeto's "the quiet place" project <br> 
  </footer>
</html>
